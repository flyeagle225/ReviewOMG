name: Daily ReviewOMG Industry News

on:
  schedule:
    # 07:01 UTC = 15:01 Asia/Shanghai
    - cron: "1 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-industry-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate daily industry note
        run: python scripts/fetch_industry_news.py

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update daily industry news"
          file_pattern: "20.行业情报/*.md"
