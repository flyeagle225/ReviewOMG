name: Daily ReviewOMG Industry News

on:
  schedule:
    # 01:00 UTC = 09:00 Asia/Shanghai
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FEISHU_EMAIL: ${{ secrets.FEISHU_EMAIL }}
  SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
  SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
  SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}

jobs:
  collect-industry-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate daily industry note
        run: python scripts/fetch_industry_news.py

      - name: Locate generated note
        shell: bash
        run: |
          echo "NEWS_FILE=$(ls -t '20.行业情报'/*.md | head -n 1)" >> "$GITHUB_ENV"

      - name: Send note to Feishu email
        if: ${{ env.FEISHU_EMAIL != '' && env.SMTP_SERVER != '' && env.SMTP_USERNAME != '' && env.SMTP_PASSWORD != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT || '465' }}
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "ReviewOMG Daily Industry News - ${{ github.run_number }}"
          to: ${{ secrets.FEISHU_EMAIL }}
          from: "ReviewOMG Bot <${{ secrets.SMTP_USERNAME }}>"
          body: |
            ReviewOMG daily industry news has been generated.

            Obsidian/GitHub path:
            ${{ env.NEWS_FILE }}

            The Markdown note is attached to this email.
          attachments: ${{ env.NEWS_FILE }}

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update daily industry news"
          file_pattern: "20.行业情报/*.md"
