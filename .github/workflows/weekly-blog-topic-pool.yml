name: Weekly ReviewOMG Blog Topic Pool

on:
  schedule:
    # Sunday 07:01 UTC = Sunday 15:01 Asia/Shanghai
    - cron: "1 7 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-topic-pool:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate weekly blog topic pool
        run: python scripts/generate_weekly_blog_ideas.py

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update weekly blog topic pool"
          file_pattern: "30.博客选题池/*.md"
